<!DOCTYPE html>
<html>

<head>
    <title>Absolute Position Example</title>

    <style>
        body {
            font-family: Arial;

            /* 10px grid background */
            background-image:
                linear-gradient(to right, #ddd 1px, transparent 1px),
                linear-gradient(to bottom, #ddd 1px, transparent 1px);

            background-size: 10px 10px;
        }

        /* container box */
        .container {
            width: 300px;
            height: 200px;
            border: 3px solid black;
            position: relative;
            margin: 80px auto;
            text-align: center;
            font-size: 20px;
            padding-top: 80px;
        }

        /* bottom right box */
        .box {
            width: 80px;
            height: 40px;
            border: 2px solid black;
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: white;
            font-size: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* info text */
        .info {
            text-align: center;
            margin-top: 20px;
            font-size: 16px;
        }
    </style>
</head>

<body>

    <h2 style="text-align:center;">Absolute Position Example</h2>

    <div class="container">
        Container Area

        <div class="box">
            Bottom Right
        </div>
    </div>


</body>

</html>
